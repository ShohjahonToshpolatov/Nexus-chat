<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0b0f;
  --surface: #111318;
  --surface2: #181b22;
  --surface3: #1e2230;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --accent: #63b3ed;
  --accent2: #9f7aea;
  --accent3: #68d391;
  --accent-msg: linear-gradient(135deg, #63b3ed, #4a9fd5);
  --text: #e8eaf0;
  --text-muted: #6b7280;
  --text-dim: #9ca3af;
  --danger: #fc8181;
  --sidebar-w: 280px;
  --header-h: 60px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* === LAYOUT === */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* === SIDEBAR === */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 16px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.brand-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  flex: 1;
}

.brand-actions {
  display: flex;
  gap: 4px;
}

.icon-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}

.icon-btn:hover { background: var(--surface2); color: var(--text); }

/* Search */
.search-wrap {
  position: relative;
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 12px 9px 34px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: all 0.2s;
}

.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: rgba(99,179,237,0.4); background: rgba(99,179,237,0.04); }

.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
  pointer-events: none;
}

/* Tabs */
.sidebar-tabs {
  display: flex;
  padding: 8px 16px;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab-btn {
  flex: 1;
  padding: 7px 6px;
  background: transparent;
  border: none;
  border-radius: 8px;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.tab-btn.active {
  background: var(--surface3);
  color: var(--accent);
}

.tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text-dim); }

.tab-badge {
  background: var(--accent);
  color: #000;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 16px;
  text-align: center;
}

/* Chat list */
.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.chat-list-section {
  padding: 4px 16px 2px;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  margin-top: 10px;
}

.chat-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  border-radius: 0;
}

.chat-item:hover { background: var(--surface2); }
.chat-item.active { background: rgba(99,179,237,0.08); }
.chat-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}

.chat-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  position: relative;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  color: #fff;
  text-transform: uppercase;
  font-size: 15px;
}

.chat-avatar.channel {
  border-radius: 12px;
  font-size: 18px;
  font-family: 'DM Sans', sans-serif;
}

.online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  background: var(--accent3);
  border-radius: 50%;
  border: 2px solid var(--surface);
}

.chat-info { flex: 1; min-width: 0; }

.chat-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chat-preview-text {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
  font-weight: 300;
}

.chat-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
}

.chat-time {
  font-size: 11px;
  color: var(--text-muted);
}

.unread-badge {
  background: var(--accent);
  color: #000;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.user-avatar-sm {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.15s;
  flex-shrink: 0;
}

.user-avatar-sm:hover { transform: scale(1.05); }

.user-info-sm { flex: 1; min-width: 0; }

.user-name-sm {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-status-sm {
  font-size: 11px;
  color: var(--accent3);
  display: flex; align-items: center; gap: 4px;
}

.user-status-sm::before {
  content: '●';
  font-size: 8px;
}

.footer-actions { display: flex; gap: 2px; }

/* === MAIN CHAT === */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-muted);
}

.empty-icon { font-size: 56px; opacity: 0.5; }
.empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-dim); }
.empty-sub { font-size: 14px; font-weight: 300; max-width: 280px; text-align: center; line-height: 1.6; }

/* Chat header */
.chat-header {
  height: var(--header-h);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  background: var(--surface);
}

.header-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.header-avatar.channel { border-radius: 10px; }

.header-info { flex: 1; min-width: 0; }
.header-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }
.header-meta { font-size: 12px; color: var(--text-muted); font-weight: 300; }
.header-meta.online { color: var(--accent3); }

.header-actions { display: flex; gap: 4px; }

.header-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
}

.header-btn:hover { background: var(--surface2); color: var(--text); }

/* Messages area */
.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

/* Date separator */
.date-sep {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
  color: var(--text-muted);
  font-size: 12px;
}

.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Message */
.msg-row {
  display: flex;
  gap: 10px;
  padding: 2px 0;
  animation: msgIn 0.25s ease both;
  max-width: 100%;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-row.sent {
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  align-self: flex-end;
}

.msg-avatar.hidden { opacity: 0; pointer-events: none; }

.msg-content { max-width: 65%; display: flex; flex-direction: column; }

.msg-row.sent .msg-content { align-items: flex-end; }

.msg-sender {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 3px;
  padding: 0 4px;
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
  position: relative;
}

.msg-row.received .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg-row.sent .msg-bubble {
  background: var(--accent-msg);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.msg-row.first-in-group.received .msg-bubble { border-top-left-radius: 4px; }
.msg-row.first-in-group.sent .msg-bubble { border-top-right-radius: 4px; }

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.msg-row.sent .msg-time { color: rgba(255,255,255,0.5); }

.msg-status { font-size: 11px; }

/* Reaction */
.msg-reactions {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 4px; padding: 0 4px;
}

.reaction-pill {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 7px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 4px;
}

.reaction-pill:hover { border-color: var(--border2); background: var(--surface3); }
.reaction-pill.mine { border-color: rgba(99,179,237,0.4); background: rgba(99,179,237,0.08); }
.reaction-count { font-size: 11px; color: var(--text-dim); }

/* System message */
.system-msg {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  margin: 8px 0;
  font-weight: 300;
  padding: 4px 12px;
  background: var(--surface2);
  border-radius: 20px;
  align-self: center;
  max-width: 80%;
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 0 20px 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.typing-indicator.show { display: flex; }

.typing-dots span {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.4s ease infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

/* Input area */
.input-area {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 8px;
}

.toolbar-btn {
  padding: 4px 8px;
  border-radius: 6px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}

.toolbar-btn:hover { background: var(--surface2); color: var(--text); }

.toolbar-sep {
  width: 1px; height: 16px;
  background: var(--border);
  margin: 0 4px;
}

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 10px 10px 10px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-row:focus-within {
  border-color: rgba(99,179,237,0.35);
  box-shadow: 0 0 0 3px rgba(99,179,237,0.06);
}

.msg-textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  resize: none;
  outline: none;
  line-height: 1.5;
  max-height: 120px;
  min-height: 22px;
  scrollbar-width: none;
}

.msg-textarea::placeholder { color: var(--text-muted); }

.input-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

.input-action-btn {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  transition: all 0.15s;
}

.input-action-btn:hover { background: var(--surface3); color: var(--text); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #4a9fd5);
  border: none;
  color: #fff;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(99,179,237,0.3); }
.send-btn:active { transform: scale(0.95); }

/* === MODALS === */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  margin: 20px;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px; font-weight: 700;
  margin-bottom: 20px;
  letter-spacing: -0.3px;
}

.modal-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.modal-input::placeholder { color: var(--text-muted); }
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,179,237,0.08); }

.modal-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  resize: none;
  height: 80px;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.modal-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,179,237,0.08); }

.modal-label {
  font-size: 12px; font-weight: 500;
  color: var(--text-dim); margin-bottom: 6px; display: block;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.type-selector {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 16px;
}

.type-btn {
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text-muted);
  font-size: 13px;
}

.type-btn:hover { border-color: var(--border2); }
.type-btn.active { border-color: var(--accent); background: rgba(99,179,237,0.08); color: var(--accent); }
.type-btn .type-emoji { display: block; font-size: 24px; margin-bottom: 6px; }

.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  margin-bottom: 14px;
}

.emoji-opt {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: var(--surface2);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.emoji-opt:hover, .emoji-opt.selected { border-color: var(--accent); background: rgba(99,179,237,0.1); }

.modal-actions {
  display: flex; gap: 8px; margin-top: 16px;
}

.btn-cancel {
  flex: 1; padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-cancel:hover { border-color: var(--border2); color: var(--text); }

.btn-confirm {
  flex: 2; padding: 12px;
  background: linear-gradient(135deg, var(--accent), #4a9fd5);
  border: none; border-radius: 10px;
  color: #000;
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-confirm:hover { opacity: 0.9; transform: translateY(-1px); }

/* Context menu */
.ctx-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 6px;
  z-index: 300;
  min-width: 160px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  display: none;
  animation: fadeIn 0.15s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.ctx-menu.show { display: block; }

.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.1s;
}

.ctx-item:hover { background: var(--surface2); color: var(--text); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: rgba(252,129,129,0.1); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* Emoji picker */
.emoji-picker {
  position: absolute;
  bottom: 100%;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 12px;
  width: 280px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  z-index: 100;
  display: none;
}

.emoji-picker.show { display: block; }

.emoji-cats {
  display: flex; gap: 4px; margin-bottom: 10px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.emoji-cat-btn {
  padding: 4px 8px;
  border-radius: 6px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.emoji-cat-btn.active { background: var(--surface2); }

.emoji-search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 10px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  margin-bottom: 8px;
  font-family: 'DM Sans', sans-serif;
}

.emoji-grid-picker {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
  max-height: 160px;
  overflow-y: auto;
}

.emoji-cell {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
}

.emoji-cell:hover { background: var(--surface2); }

/* Toast */
.toast {
  position: fixed; top: 20px; right: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 13px; color: var(--text);
  z-index: 999; opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  max-width: 280px;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* Right panel info */
.info-panel {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: none;
  flex-direction: column;
  overflow-y: auto;
}

.info-panel.open { display: flex; }

.info-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.info-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; }

.info-body { padding: 20px 16px; }

.info-avatar-big {
  width: 72px; height: 72px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 12px;
}

.info-name {
  font-family: 'Syne', sans-serif;
  font-size: 18px; font-weight: 700;
  text-align: center; margin-bottom: 4px;
}

.info-username {
  font-size: 13px; color: var(--text-muted);
  text-align: center; margin-bottom: 16px;
}

.info-stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  font-size: 13px;
  display: flex; align-items: center; justify-content: space-between;
}

.info-stat-label { color: var(--text-muted); }
.info-stat-val { font-weight: 500; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">💬</div>
        <span class="brand-name">NexusChat</span>
        <div class="brand-actions">
          <button class="icon-btn" onclick="openCreateModal()" title="New chat">✏️</button>
          <button class="icon-btn" onclick="toggleNotifs()" title="Notifications" id="notifBtn">🔔</button>
        </div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search chats..." oninput="filterChats(this.value)" id="searchInput">
      </div>
    </div>

    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('all', this)">All</button>
      <button class="tab-btn" onclick="switchTab('channels', this)">📢 Channels</button>
      <button class="tab-btn" onclick="switchTab('groups', this)">👥 Groups</button>
    </div>

    <div class="chat-list" id="chatList">
      <!-- populated by JS -->
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar-sm" id="myAvatarSm" onclick="openProfile()" title="Profile"></div>
      <div class="user-info-sm">
        <div class="user-name-sm" id="myNameSm">Loading...</div>
        <div class="user-status-sm">Online</div>
      </div>
      <div class="footer-actions">
        <button class="icon-btn" onclick="openProfile()" title="Profile">⚙️</button>
        <button class="icon-btn" onclick="logout()" title="Logout">🚪</button>
      </div>
    </div>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-main" id="chatMain">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Select a chat</div>
      <div class="empty-sub">Choose from your channels or groups, or create a new one to get started.</div>
    </div>

    <!-- Chat view (hidden until chat selected) -->
    <div id="chatView" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden;">
      <div class="chat-header" id="chatHeader">
        <div class="header-avatar" id="headerAvatar"></div>
        <div class="header-info">
          <div class="header-name" id="headerName">Chat</div>
          <div class="header-meta" id="headerMeta"></div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="toggleInfo()" id="infoBtn" title="Info">ℹ️</button>
          <button class="header-btn" onclick="searchMessages()" title="Search">🔍</button>
          <button class="header-btn" onclick="showChatMenu(event)" title="More">⋮</button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea"></div>

      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typingText">Someone is typing...</span>
      </div>

      <div class="input-area">
        <div class="input-toolbar">
          <button class="toolbar-btn" onclick="formatText('bold')" title="Bold"><b>B</b></button>
          <button class="toolbar-btn" onclick="formatText('italic')" title="Italic"><i>I</i></button>
          <button class="toolbar-btn" onclick="formatText('code')" title="Code">⌨️</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="insertEmoji('👍')">👍</button>
          <button class="toolbar-btn" onclick="insertEmoji('❤️')">❤️</button>
          <button class="toolbar-btn" onclick="insertEmoji('😂')">😂</button>
          <button class="toolbar-btn" onclick="insertEmoji('🔥')">🔥</button>
        </div>
        <div class="input-row">
          <textarea class="msg-textarea" id="msgInput" placeholder="Write a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <div class="input-actions">
            <div style="position:relative;">
              <button class="input-action-btn" onclick="toggleEmojiPicker()" title="Emoji">😊</button>
              <div class="emoji-picker" id="emojiPicker">
                <div class="emoji-cats">
                  <button class="emoji-cat-btn active">😊</button>
                  <button class="emoji-cat-btn">❤️</button>
                  <button class="emoji-cat-btn">🎉</button>
                  <button class="emoji-cat-btn">🌍</button>
                  <button class="emoji-cat-btn">⚡</button>
                </div>
                <input class="emoji-search" placeholder="Search emoji..." oninput="searchEmoji(this.value)">
                <div class="emoji-grid-picker" id="emojiGridPicker"></div>
              </div>
            </div>
            <button class="input-action-btn" onclick="attachFile()" title="Attach">📎</button>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- INFO PANEL -->
  <aside class="info-panel" id="infoPanel">
    <div class="info-header">
      <div class="info-title">Info</div>
      <button class="icon-btn" onclick="toggleInfo()">✕</button>
    </div>
    <div class="info-body" id="infoPanelBody"></div>
  </aside>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-title">Create new space</div>

    <div class="type-selector">
      <div class="type-btn active" id="typeChannel" onclick="selectType('channel')">
        <span class="type-emoji">📢</span>
        Channel
      </div>
      <div class="type-btn" id="typeGroup" onclick="selectType('group')">
        <span class="type-emoji">👥</span>
        Group
      </div>
    </div>

    <label class="modal-label">Pick an emoji</label>
    <div class="emoji-grid" id="chatEmojiGrid"></div>

    <label class="modal-label">Name</label>
    <input class="modal-input" id="newChatName" placeholder="e.g. Design Team, Football...">

    <label class="modal-label">Description (optional)</label>
    <textarea class="modal-textarea" id="newChatDesc" placeholder="What's this space about?"></textarea>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('createModal')">Cancel</button>
      <button class="btn-confirm" onclick="createChat()">Create ✨</button>
    </div>
  </div>
</div>

<!-- CTX MENU -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="replyToMsg()">↩️ Reply</div>
  <div class="ctx-item" onclick="copyMsg()">📋 Copy</div>
  <div class="ctx-item" onclick="reactToMsg()">😊 Add Reaction</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="deleteMsg()">🗑 Delete</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <span id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
// ============ STATE ============
let state = {
  currentUser: null,
  chats: [],
  currentChatId: null,
  activeTab: 'all',
  notifsMuted: false,
  selectedMsgId: null,
  selectedChatEmoji: '💬',
  createType: 'channel'
};

const CHAT_EMOJIS = ['💬','🔥','⚽','🎮','🎵','📚','🌍','💡','🚀','🎨','🍕','🎭','🏆','🌙','💎','🦁','🐺','🎯','⚡','🌊'];
const EMOJI_LIST = ['😀','😂','😍','🥺','😎','🤩','🥳','😴','🤔','😱','🔥','❤️','💯','✅','🚀','💎','🎉','👍','❌','⭐','🌟','💪','🙌','👀','🤝','🎯','💬','📢','🌍','🎵','🎮','🍕','🏆','🌊','⚡','🦁','🦊','🐺','🤖','🎭'];

// ============ INIT ============
function init() {
  const saved = localStorage.getItem('nexus_current');
  if (!saved) { location.href = '../index.html'; return; }
  state.currentUser = JSON.parse(saved);
  loadChats();
  renderUserInfo();
  renderChatList();
  buildEmojiGrid();
  buildChatEmojiGrid();
  buildEmojiPicker();

  // Demo chats if empty
  if (state.chats.length === 0) {
    createDemoChats();
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#ctxMenu')) closeCtxMenu();
    if (!e.target.closest('.emoji-picker') && !e.target.closest('[onclick*="toggleEmojiPicker"]')) {
      document.getElementById('emojiPicker').classList.remove('show');
    }
  });
}

function createDemoChats() {
  const demos = [
    {
      id: 'c_demo1', type: 'channel', name: 'General', emoji: '🌍',
      description: 'Main channel for everyone',
      messages: [
        { id: 'm1', text: 'Welcome to NexusChat! 🎉', senderId: 'bot', senderName: 'NexusBot', senderAvatar: '🤖', time: Date.now() - 3600000, reactions: { '🎉': ['bot'] } },
        { id: 'm2', text: 'This is your main channel. Start chatting!', senderId: 'bot', senderName: 'NexusBot', senderAvatar: '🤖', time: Date.now() - 3500000 },
      ]
    },
    {
      id: 'c_demo2', type: 'channel', name: 'Football ⚽', emoji: '⚽',
      description: 'Football talk',
      messages: [
        { id: 'm3', text: 'Did you watch the game last night? 🔥', senderId: 'alice', senderName: 'Alice', senderAvatar: '🦊', time: Date.now() - 7200000 },
        { id: 'm4', text: 'Epic match! 3-2 in extra time', senderId: 'bob', senderName: 'Bob', senderAvatar: '🐺', time: Date.now() - 7100000 },
      ]
    },
    {
      id: 'c_demo3', type: 'group', name: 'Dev Squad 🚀', emoji: '🚀',
      description: 'Team developers',
      messages: [
        { id: 'm5', text: 'New feature deployed ✅', senderId: 'alice', senderName: 'Alice', senderAvatar: '🦊', time: Date.now() - 1800000 },
        { id: 'm6', text: 'Looks great! Nice work 💪', senderId: 'bob', senderName: 'Bob', senderAvatar: '🐺', time: Date.now() - 1700000 },
        { id: 'm7', text: 'Should we merge the PR now?', senderId: 'alice', senderName: 'Alice', senderAvatar: '🦊', time: Date.now() - 900000 },
      ]
    },
  ];
  state.chats = demos;
  saveChats();
  renderChatList();
}

// ============ STORAGE ============
function loadChats() {
  state.chats = JSON.parse(localStorage.getItem('nexus_chats') || '[]');
}

function saveChats() {
  localStorage.setItem('nexus_chats', JSON.stringify(state.chats));
}

// ============ RENDER ============
function renderUserInfo() {
  const u = state.currentUser;
  const sm = document.getElementById('myAvatarSm');
  sm.textContent = u.avatar || u.name[0];
  sm.style.background = u.avatarColor || 'linear-gradient(135deg,#63b3ed,#9f7aea)';
  sm.style.fontSize = u.avatar ? '18px' : '14px';
  document.getElementById('myNameSm').textContent = u.name;
}

function renderChatList() {
  const list = document.getElementById('chatList');
  const filter = document.getElementById('searchInput').value.toLowerCase();

  let chats = state.chats.filter(c => {
    if (state.activeTab === 'channels' && c.type !== 'channel') return false;
    if (state.activeTab === 'groups' && c.type !== 'group') return false;
    if (filter && !c.name.toLowerCase().includes(filter)) return false;
    return true;
  });

  list.innerHTML = '';

  if (chats.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;font-weight:300;">No chats found</div>';
    return;
  }

  // Sections
  const channels = chats.filter(c => c.type === 'channel');
  const groups = chats.filter(c => c.type === 'group');

  function renderSection(items, label) {
    if (!items.length) return;
    const section = document.createElement('div');
    section.className = 'chat-list-section';
    section.innerHTML = `<div class="section-label">${label}</div>`;
    list.appendChild(section);
    items.forEach(chat => renderChatItem(chat, list));
  }

  if (state.activeTab === 'all') {
    renderSection(channels, '📢 Channels');
    renderSection(groups, '👥 Groups');
  } else {
    chats.forEach(chat => renderChatItem(chat, list));
  }
}

function renderChatItem(chat, list) {
  const div = document.createElement('div');
  div.className = 'chat-item' + (chat.id === state.currentChatId ? ' active' : '');
  div.onclick = () => openChat(chat.id);

  const lastMsg = chat.messages && chat.messages.length > 0 ? chat.messages[chat.messages.length - 1] : null;
  const lastText = lastMsg ? lastMsg.text : 'No messages yet';
  const lastTime = lastMsg ? formatTime(lastMsg.time) : '';

  const avatarStyle = `background: ${getAvatarColor(chat.type)}; color:#fff; ${chat.type === 'channel' ? 'border-radius:12px;' : ''}`;

  div.innerHTML = `
    <div class="chat-avatar ${chat.type === 'channel' ? 'channel' : ''}" style="${avatarStyle}">${chat.emoji || chat.name[0]}</div>
    <div class="chat-info">
      <div class="chat-name">${chat.name}</div>
      <div class="chat-preview-text">${escHtml(lastText.substring(0, 40))}${lastText.length > 40 ? '...' : ''}</div>
    </div>
    <div class="chat-meta">
      <div class="chat-time">${lastTime}</div>
    </div>
  `;

  list.appendChild(div);
}

function getAvatarColor(type) {
  return type === 'channel' ? 'linear-gradient(135deg,#63b3ed,#4a9fd5)' : 'linear-gradient(135deg,#9f7aea,#7c5cc4)';
}

// ============ CHAT ============
function openChat(id) {
  state.currentChatId = id;
  const chat = state.chats.find(c => c.id === id);
  if (!chat) return;

  document.getElementById('emptyState').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';
  chatView.style.flexDirection = 'column';
  chatView.style.overflow = 'hidden';
  chatView.style.flex = '1';

  // Header
  const avatarEl = document.getElementById('headerAvatar');
  avatarEl.textContent = chat.emoji || chat.name[0];
  avatarEl.style.background = getAvatarColor(chat.type);
  avatarEl.className = 'header-avatar' + (chat.type === 'channel' ? ' channel' : '');

  document.getElementById('headerName').textContent = chat.name;
  const meta = document.getElementById('headerMeta');
  if (chat.type === 'channel') {
    meta.textContent = `Channel · ${chat.description || 'No description'}`;
  } else {
    meta.textContent = `Group · ${Math.floor(Math.random()*20)+2} members`;
    meta.className = 'header-meta online';
  }

  renderMessages();
  renderChatList();
  document.getElementById('msgInput').focus();
}

function renderMessages() {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '';
  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat || !chat.messages) return;

  area.innerHTML = `<div class="date-sep">Today</div>`;

  chat.messages.forEach((msg, idx) => {
    const prev = idx > 0 ? chat.messages[idx - 1] : null;
    const isFirst = !prev || prev.senderId !== msg.senderId;
    const isMine = msg.senderId === state.currentUser.id;

    const row = document.createElement('div');
    row.className = `msg-row ${isMine ? 'sent' : 'received'} ${isFirst ? 'first-in-group' : ''}`;
    row.dataset.msgId = msg.id;
    row.addEventListener('contextmenu', e => { e.preventDefault(); showCtxMenu(e, msg.id); });

    const avatarHtml = !isMine ? `<div class="msg-avatar ${!isFirst ? 'hidden' : ''}" style="background:${msg.senderAvatar ? 'transparent' : 'linear-gradient(135deg,#63b3ed,#9f7aea)'}">${msg.senderAvatar || msg.senderName?.[0] || '?'}</div>` : '';
    const sentAvatarHtml = isMine ? `<div class="msg-avatar" style="background:${state.currentUser.avatarColor || 'linear-gradient(135deg,#63b3ed,#9f7aea)'};font-size:14px">${state.currentUser.avatar || state.currentUser.name[0]}</div>` : '';

    // Reactions
    let reactionsHtml = '';
    if (msg.reactions && Object.keys(msg.reactions).length > 0) {
      reactionsHtml = '<div class="msg-reactions">';
      for (const [emoji, users] of Object.entries(msg.reactions)) {
        const mine = users.includes(state.currentUser.id);
        reactionsHtml += `<div class="reaction-pill ${mine ? 'mine' : ''}" onclick="toggleReaction('${msg.id}','${emoji}')">${emoji}<span class="reaction-count">${users.length}</span></div>`;
      }
      reactionsHtml += '</div>';
    }

    const tickHtml = isMine ? `<span class="msg-status">✓✓</span>` : '';

    row.innerHTML = `
      ${avatarHtml}
      <div class="msg-content">
        ${isFirst && !isMine ? `<div class="msg-sender">${msg.senderName || 'User'}</div>` : ''}
        <div class="msg-bubble">${escHtml(msg.text)}</div>
        ${reactionsHtml}
        <div class="msg-time">${formatTime(msg.time)} ${tickHtml}</div>
      </div>
      ${sentAvatarHtml}
    `;

    area.appendChild(row);
  });

  area.scrollTop = area.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !state.currentChatId) return;

  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat) return;

  const msg = {
    id: 'm_' + Date.now(),
    text,
    senderId: state.currentUser.id,
    senderName: state.currentUser.name,
    senderAvatar: state.currentUser.avatar,
    time: Date.now(),
    reactions: {}
  };

  chat.messages.push(msg);
  saveChats();
  input.value = '';
  input.style.height = '22px';
  renderMessages();
  renderChatList();

  // Simulate reply after delay
  if (Math.random() > 0.4) {
    const bots = [
      { id: 'alice', name: 'Alice', avatar: '🦊' },
      { id: 'bob', name: 'Bob', avatar: '🐺' },
      { id: 'charlie', name: 'Charlie', avatar: '🦁' }
    ];
    const bot = bots[Math.floor(Math.random() * bots.length)];
    const replies = [
      'That\'s interesting! 🤔', 'Totally agree! 💯', 'Nice one 🔥', 'Let me check on that', 'Good point!',
      'Wow, didn\'t know that', '👍', 'Haha exactly 😂', 'Makes sense', 'Tell me more!'
    ];

    showTyping(bot.name);
    setTimeout(() => {
      hideTyping();
      const replyMsg = {
        id: 'm_' + Date.now(),
        text: replies[Math.floor(Math.random() * replies.length)],
        senderId: bot.id,
        senderName: bot.name,
        senderAvatar: bot.avatar,
        time: Date.now(),
        reactions: {}
      };
      chat.messages.push(replyMsg);
      saveChats();
      renderMessages();
      renderChatList();
    }, 1500 + Math.random() * 1500);
  }
}

function showTyping(name) {
  const t = document.getElementById('typingIndicator');
  document.getElementById('typingText').textContent = `${name} is typing...`;
  t.classList.add('show');
  const area = document.getElementById('messagesArea');
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator').classList.remove('show');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = '22px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ============ REACTIONS ============
function toggleReaction(msgId, emoji) {
  const chat = state.chats.find(c => c.id === state.currentChatId);
  const msg = chat?.messages.find(m => m.id === msgId);
  if (!msg) return;

  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];

  const idx = msg.reactions[emoji].indexOf(state.currentUser.id);
  if (idx >= 0) {
    msg.reactions[emoji].splice(idx, 1);
    if (msg.reactions[emoji].length === 0) delete msg.reactions[emoji];
  } else {
    msg.reactions[emoji].push(state.currentUser.id);
  }

  saveChats();
  renderMessages();
}

// ============ CREATE CHAT ============
function openCreateModal() {
  document.getElementById('createModal').classList.add('show');
  document.getElementById('newChatName').focus();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function selectType(type) {
  state.createType = type;
  document.getElementById('typeChannel').className = 'type-btn' + (type === 'channel' ? ' active' : '');
  document.getElementById('typeGroup').className = 'type-btn' + (type === 'group' ? ' active' : '');
}

function buildChatEmojiGrid() {
  const grid = document.getElementById('chatEmojiGrid');
  grid.innerHTML = '';
  CHAT_EMOJIS.forEach((e, i) => {
    const btn = document.createElement('div');
    btn.className = 'emoji-opt' + (i === 0 ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      state.selectedChatEmoji = e;
    };
    grid.appendChild(btn);
  });
  state.selectedChatEmoji = CHAT_EMOJIS[0];
}

function createChat() {
  const name = document.getElementById('newChatName').value.trim();
  const desc = document.getElementById('newChatDesc').value.trim();
  if (!name) { showToast('Please enter a name', 'error'); return; }

  const chat = {
    id: 'c_' + Date.now(),
    type: state.createType,
    name,
    emoji: state.selectedChatEmoji,
    description: desc,
    messages: [{
      id: 'm_sys_' + Date.now(),
      text: `${state.currentUser.name} created this ${state.createType}`,
      senderId: 'system',
      senderName: 'System',
      senderAvatar: '⚙️',
      time: Date.now(),
      reactions: {},
      isSystem: true
    }]
  };

  state.chats.unshift(chat);
  saveChats();
  renderChatList();
  closeModal('createModal');
  document.getElementById('newChatName').value = '';
  document.getElementById('newChatDesc').value = '';
  openChat(chat.id);
  showToast(`${state.createType === 'channel' ? 'Channel' : 'Group'} "${name}" created! ✨`);
}

// ============ TABS / FILTER ============
function switchTab(tab, btn) {
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

function filterChats(val) { renderChatList(); }

// ============ CTX MENU ============
function showCtxMenu(e, msgId) {
  state.selectedMsgId = msgId;
  const menu = document.getElementById('ctxMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');
  // Adjust if off screen
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (e.clientX - rect.width) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (e.clientY - rect.height) + 'px';
}

function closeCtxMenu() { document.getElementById('ctxMenu').classList.remove('show'); }

function copyMsg() {
  const chat = state.chats.find(c => c.id === state.currentChatId);
  const msg = chat?.messages.find(m => m.id === state.selectedMsgId);
  if (msg) {
    navigator.clipboard?.writeText(msg.text).catch(() => {});
    showToast('Copied to clipboard 📋');
  }
  closeCtxMenu();
}

function deleteMsg() {
  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat) return;
  chat.messages = chat.messages.filter(m => m.id !== state.selectedMsgId);
  saveChats();
  renderMessages();
  closeCtxMenu();
  showToast('Message deleted');
}

function replyToMsg() {
  const chat = state.chats.find(c => c.id === state.currentChatId);
  const msg = chat?.messages.find(m => m.id === state.selectedMsgId);
  if (msg) {
    const input = document.getElementById('msgInput');
    input.value = `> ${msg.text.substring(0, 40)}\n`;
    input.focus();
  }
  closeCtxMenu();
}

function reactToMsg() {
  const reactions = ['👍','❤️','😂','🔥','🎉','😮','👀','💯'];
  const r = reactions[Math.floor(Math.random() * reactions.length)];
  toggleReaction(state.selectedMsgId, r);
  closeCtxMenu();
}

// ============ EMOJI PICKER ============
function buildEmojiPicker() {
  const grid = document.getElementById('emojiGridPicker');
  grid.innerHTML = '';
  EMOJI_LIST.forEach(e => {
    const cell = document.createElement('div');
    cell.className = 'emoji-cell';
    cell.textContent = e;
    cell.onclick = () => {
      insertEmoji(e);

function buildEmojiGrid() {} // unused now

function toggleEmojiPicker() {

}

function searchEmoji(q) {

}

function insertEmoji(e) {
  const input = document.getElementById('msgInput');

  input.focus();
}

function formatText(type) {
  const input = document.getElementById('msgInput');
  const map = { bold: '**text**', italic: '_text_', code: '`code`' };
  input.value += map[type] || '';

// ============ INFO PANEL ============
function toggleInfo() {
  const panel = document.getElementById('infoPanel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderInfoPanel();
}

function renderInfoPanel() {
  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat) return;
  const body = document.getElementById('infoPanelBody');

  body.innerHTML = `
    <div class="info-avatar-big" style="background:${getAvatarColor(chat.type)}">${chat.emoji || chat.name[0]}</div>
    <div class="info-name">${chat.name}</div>
    <div class="info-username">${chat.type === 'channel' ? '📢 Channel' : '👥 Group'}</div>
    <div class="info-stat">
      <span class="info-stat-label">Messages</span>
      <span class="info-stat-val">${chat.messages?.length || 0}</span>
    </div>
    <div class="info-stat">
      <span class="info-stat-label">Members</span>
      <span class="info-stat-val">${Math.floor(Math.random()*20)+2}</span>
    </div>
    <div class="info-stat">
      <span class="info-stat-label">Created</span>
      <span class="info-stat-val">Today</span>
    </div>
    ${chat.description ? `
    <div style="margin-top:12px">
      <div class="info-stat-label" style="margin-bottom:6px">About</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.6;font-weight:300">${escHtml(chat.description)}</div>
    </div>` : ''}
    <div style="margin-top:16px;display:flex;gap:8px">
      <button onclick="deleteChat()" style="flex:1;padding:10px;background:rgba(252,129,129,0.1);border:1px solid rgba(252,129,129,0.3);border-radius:10px;color:var(--danger);cursor:pointer;font-size:13px;font-family:inherit">🗑 Delete</button>
    </div>
  `;
}

function deleteChat() {
  if (!confirm('Delete this chat?')) return;
  state.chats = state.chats.filter(c => c.id !== state.currentChatId);
  state.currentChatId = null;
  saveChats();
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('emptyState').style.display = '';
  document.getElementById('infoPanel').classList.remove('open');
  renderChatList();
  showToast('Chat deleted');
}

function showChatMenu(e) {
  state.selectedMsgId = null;
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <div class="ctx-item" onclick="closeCtxMenu();showToast('Muted 🔇')">🔇 Mute notifications</div>
    <div class="ctx-item" onclick="closeCtxMenu();renderMessages()">🔄 Refresh</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="deleteChat();closeCtxMenu()">🗑 Delete chat</div>
  `;
  menu.style.right = '20px';
  menu.style.left = 'auto';
  menu.style.top = '60px';
  menu.classList.add('show');
}

// ============ UTILS ============
function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm';
  if (diff < 86400000) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString([], {month:'short',day:'numeric'});
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

function logout() {
  if (confirm('Sign out?')) {
    localStorage.removeItem('nexus_current');
    location.href = '../index.html';
  }
}
